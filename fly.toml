# fly.toml — config de deploy de la API en Fly.io.
# Reproducida de la config viva de la app el 22/07/2026 (flyctl config show),
# con dos correcciones: primary_region 'gru' (la decisión cerrada #7; el 'iad'
# que generó el Launch del dashboard era el default, las máquinas ya corren en
# gru) y el sizing sin la contradicción memory='1gb'/memory_mb=256 que traía
# el fly.toml generado — las máquinas reales son shared-cpu-1x:256MB.
#
# internal_port 8080: el secret API_PORT de Fly overridea el default 3100 del
# Dockerfile. Si se cambia uno hay que cambiar el otro.

app = 'comparador-precios'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
