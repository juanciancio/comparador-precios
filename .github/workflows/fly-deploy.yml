# Auto-deploy de la API a Fly.io en cada push a main.
# Los commits del bot de LATEST_RUN.md llevan [skip ci] y no disparan deploy.
name: Fly Deploy

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
